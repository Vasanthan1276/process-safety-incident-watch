name: Weekly Process Safety Incident Update

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"
      timezone: "Asia/Singapore"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: process-safety-weekly-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run incident monitor
        run: python -u src/main.py

      - name: Commit updated incident data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data history public/data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: weekly incident intelligence update"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
